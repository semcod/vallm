[tox]
envlist = lint,security,test
isolated_build = true
skip_missing_interpreters = true
skipsdist = true

[testenv]
description = Run test suite with pytest
# Użyj sitepackages z istniejącego venv
sitepackages = true
envdir = {toxinidir}/.tox/.venv
deps =
commands =
    python -m pytest {posargs:tests/} -v --tb=short -m "not slow and not integration"

[testenv:test]
description = Run test suite
commands =
    python -m pytest tests/ -v --tb=short -m "not slow and not integration" {posargs}

[testenv:lint]
description = Run linting with ruff
commands =
    python -m ruff check src/ tests/ examples/ mcp/
    python -m ruff format --check src/ tests/ examples/ mcp/

[testenv:format]
description = Format code with ruff
commands =
    python -m ruff format src/ tests/ examples/ mcp/
    python -m ruff check --fix src/ tests/ examples/ mcp/

[testenv:security]
description = Run security checks with bandit
commands =
    python -m bandit -r src/vallm -ll

[testenv:integration]
description = Run integration tests
commands =
    python -m pytest tests/ -v --tb=short -m integration {posargs}

[testenv:slow]
description = Run slow tests
commands =
    python -m pytest tests/ -v --tb=short -m slow {posargs}

[testenv:all]
description = Run all tests including slow and integration
commands =
    python -m pytest tests/ -v --tb=short {posargs}

[testenv:docs]
description = Check documentation
commands =
    python -c "import vallm; print('Documentation check passed')"

[testenv:mcp]
description = Test MCP integration
commands =
    python -m pytest test_mcp.py -v
    python mcp/tests/quick_test.py

[testenv:e2e]
description = Run end-to-end tests
commands =
    python -m pytest tests/test_cli_e2e.py -v --tb=short

[testenv:clean]
description = Clean up build artifacts
deps =
allowlist_externals = rm,find
commands =
    rm -rf .tox htmlcov coverage.xml bandit-report.json
    rm -rf .pytest_cache .ruff_cache
    rm -rf dist build *.egg-info
    find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
    find . -type f -name "*.pyc" -delete 2>/dev/null || true

[testenv:benchmark]
description = Run performance benchmarks
commands =
    python -m pytest tests/test_performance.py -v {posargs}

[testenv:regression]
description = Run regression tests
commands =
    python -m pytest tests/test_regression_validator.py -v {posargs}

[testenv:report]
description = Generate coverage report
commands =
    python -m pytest tests/ -v --tb=short \
        --cov=src/vallm \
        --cov-report=html:htmlcov \
        --cov-report=term-missing \
        -m "not slow and not integration"

[gh-actions]
python =
    3.10: test
    3.11: test
    3.12: test
    3.13: test,lint,security
